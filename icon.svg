<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001800"/>
      <stop offset="100%" stop-color="#000800"/>
    </linearGradient>
  </defs>

  <!-- Outer casing -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <rect x="2" y="2" width="508" height="508" rx="63" fill="none" stroke="#3a3a3a" stroke-width="3"/>

  <!-- Screen bezel -->
  <rect x="32" y="40" width="448" height="290" rx="18" fill="#111"/>
  <rect x="44" y="52" width="424" height="266" rx="12" fill="url(#scr)"/>

  <!-- Scanlines on screen -->
  <rect x="44" y="52" width="424" height="266" rx="12"
    fill="none" opacity="0.12"
    style="background:repeating-linear-gradient(180deg,rgba(0,0,0,0.2) 0,rgba(0,0,0,0.2) 2px,transparent 2px,transparent 4px)"/>

  <!-- Screen glow vignette -->
  <radialGradient id="vig" cx="50%" cy="50%" r="50%">
    <stop offset="40%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
  </radialGradient>
  <rect x="44" y="52" width="424" height="266" rx="12" fill="url(#vig)"/>

  <!-- Pixel-art RC on screen -->
  <!-- R -->
  <g fill="#33ff33" filter="url(#glow)" opacity="0.95">
    <rect x="100" y="110" width="14" height="70"/>
    <rect x="114" y="110" width="44" height="14"/>
    <rect x="158" y="124" width="14" height="28"/>
    <rect x="114" y="152" width="44" height="14"/>
    <rect x="148" y="166" width="24" height="14"/>
    <rect x="158" y="180" width="14" height="14"/>
    <!-- C -->
    <rect x="196" y="110" width="14" height="70"/>
    <rect x="210" y="110" width="48" height="14"/>
    <rect x="210" y="166" width="48" height="14"/>
  </g>

  <!-- Decorative dots (dots on screen like a game) -->
  <g fill="#1a4a1a">
    <circle cx="310" cy="132" r="5"/>
    <circle cx="330" cy="132" r="5"/>
    <circle cx="350" cy="132" r="5"/>
    <circle cx="370" cy="132" r="5"/>
    <circle cx="310" cy="155" r="5"/>
    <circle cx="370" cy="155" r="5"/>
    <circle cx="310" cy="178" r="5"/>
    <circle cx="330" cy="178" r="5"/>
    <circle cx="350" cy="178" r="5"/>
    <circle cx="370" cy="178" r="5"/>
  </g>

  <!-- Controller area background -->
  <rect x="32" y="345" width="448" height="140" rx="12" fill="#111"/>

  <!-- D-Pad -->
  <rect x="88" y="368" width="60" height="22" rx="4" fill="#252525"/>
  <rect x="107" y="349" width="22" height="60" rx="4" fill="#252525"/>
  <circle cx="118" cy="379" r="12" fill="#333"/>

  <!-- Action buttons -->
  <circle cx="350" cy="400" r="22" fill="#880000"/>
  <circle cx="350" cy="400" r="16" fill="#cc0000"/>
  <circle cx="350" cy="400" r="8" fill="#ff2200"/>

  <circle cx="400" cy="370" r="22" fill="#000066"/>
  <circle cx="400" cy="370" r="16" fill="#0000cc"/>
  <circle cx="400" cy="370" r="8" fill="#2244ff"/>

  <circle cx="400" cy="430" r="22" fill="#004400"/>
  <circle cx="400" cy="430" r="16" fill="#008800"/>
  <circle cx="400" cy="430" r="8" fill="#00cc22"/>

  <circle cx="300" cy="400" r="22" fill="#665500"/>
  <circle cx="300" cy="400" r="16" fill="#cc9900"/>
  <circle cx="300" cy="400" r="8" fill="#ffbb00"/>

  <!-- Start / Select buttons -->
  <rect x="215" y="395" width="36" height="10" rx="5" fill="#2a2a2a"/>
  <rect x="261" y="395" width="36" height="10" rx="5" fill="#2a2a2a"/>

  <!-- Brand label -->
  <text x="256" y="340" font-family="monospace" font-size="13" font-weight="bold"
        fill="#ff5500" text-anchor="middle" letter-spacing="3" opacity="0.8">RETROCADE</text>
</svg>
